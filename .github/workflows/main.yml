


         
         
            name: Salesforce CI Pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: |
          npm install --global sfdx-cli

      - name: Verify Salesforce CLI
        run: sfdx --version

      - name: Authenticate Dev Hub
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sfdx auth:sfdxurl:store -f auth.txt -a DevHub

      - name: Create Scratch Org
        run: |
          sfdx force:org:create -s -f config/project-scratch-def.json -a CIOrg -d 1

      - name: Push Source to Org
        run: |
          sfdx force:source:push

      - name: Run Apex Tests
        run: |
          sfdx force:apex:test:run --resultformat human --wait 10

      - name: Delete Scratch Org
        if: always()
        run: |
          sfdx force:org:delete -u CIOrg -p
